<!DOCTYPE html>
<html>
<head>
    <title>Greeting</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="box">
    <h1 id="message"></h1>
    <br>
    <a href="/">Go Back</a>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const name = params.get("name") || "Guest";
    document.getElementById("message").innerText = "Hello, " + name + "!";
</script>

</body>
</html>
